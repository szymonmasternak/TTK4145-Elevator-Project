# .github/workflows/go_build.yml
name: Go Build And Upload Artifacts

on:
  push:
    branches:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - { name: "linux-amd64", goos: "linux", goarch: "amd64" }
          - { name: "darwin-amd64", goos: "darwin", goarch: "amd64" }
          - { name: "darwin-arm64", goos: "darwin", goarch: "arm64" }
    steps:
      - name: Checkout Code from Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.4'

      - name: Build Project for ${{ matrix.platform.name }}
        run: |
          echo "Building for GOOS=${{ matrix.platform.goos }} and GOARCH=${{ matrix.platform.goarch }}"
          GOOS=${{ matrix.platform.goos }} GOARCH=${{ matrix.platform.goarch }} make build

      - name: Rename binary for ${{ matrix.platform.name }}
        run: |
          mv build/elevator build/elevator-${{ matrix.platform.name }}

      - name: Upload artifact for ${{ matrix.platform.name }}
        uses: actions/upload-artifact@v4
        with:
          name: elevator-${{ matrix.platform.name }}
          path: build/elevator-${{ matrix.platform.name }}